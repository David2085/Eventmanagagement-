<style>

body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a1a; font-size: 14px; line-height: 1.6; }

header { background: #1a2a4a; color: white; padding: 20px 28px; }

.scorebar { background: white; padding: 14px 28px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 20px; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 8px rgba(0,0,0,0.07); flex-wrap: wrap; }

.stat strong { color: #1a1a1a; }
#btn-results { background: #1a2a4a; color: white; border: none; padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; display: none; }

#btn-reset { background: #f1f5f9; color: #374151; border: 1px solid #d1d5db; padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; }

.question-card.wrong { border-left-color: #ef4444; background: #fff5f5; }

.q-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.q-num { background: #f1f5f9; color: #6b7280; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; margin-top: 2px; }

.btn-row { display: flex; gap: 8px; }

.btn-j { border-color: #10b981; color: #065f46; }

.btn-o { border-color: #ef4444; color: #991b1b; }

.btn-j.selected-correct { background: #10b981; color: white; border-color: #10b981; opacity: 1 !important; }
.btn-o.selected-correct { background: #10b981; color: white; border-color: #10b981; opacity: 1 !important; }
.btn-j.selected-wrong { background: #ef4444; color: white; border-color: #ef4444; opacity: 1 !important; }
.btn-o.selected-wrong { background: #ef4444; color: white; border-color: #ef4444; opacity: 1 !important; }

.feedback.correct { background: #dcfce7; color: #166534; display: block; }

#results-panel { display: none; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); padding: 28px 32px; max-width: 500px; margin: 20px auto; text-align: center; }

#results-panel .breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; text-align: left; }
#results-panel .bitem { background: #f8fafc; border-radius: 8px; padding: 10px 14px; }
#results-panel .bitem strong { display: block; font-size: 18px; color: #1a2a4a; }
#results-panel .bitem span { font-size: 12px; color: #6b7280; }
</style>

<script>

  // ===== H1: HET PROJECT =====

  { section: null, num: 2,
    text: "Een project heeft altijd een vooraf vastgesteld budget.",

    text: "Evenementen zijn een apart soort project waarbij het projectresultaat op een vast moment ontstaat.",

    text: "Een projectstart-up vergadering wordt ook wel een kick-off vergadering genoemd.",

  // ===== H4: PLANNING =====
  { section: "H4 — Planning", num: 25,

    text: "Een netwerkplanning toont de afhankelijkheden tussen activiteiten en helpt het kritische pad te bepalen.",

  { section: null, num: 29,
    text: "Een planning en een Plan van Aanpak zijn hetzelfde document.",

  // ===== H5: 6P-METHODE =====

    text: "In de P6-methode worden de ontwerp-, voorbereidings- en realisatiefase samengevoegd tot stap 4 'Uitvoeren'.",

  { section: null, num: 31,
    text: "In stap 4 van de P6-methode worden de beheersaspecten TGKIO bewaakt.",

    text: "De zesde stap van de P6-methode heet 'Evalueren'.",

let answered = 0, correct = 0, wrong = 0;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  let currentSection = null;

  questions.forEach((q, idx) => {
    if (q.section && q.section !== currentSection) {
      currentSection = q.section;
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = q.section;
      container.appendChild(label);
    }

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${idx}`;

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">${q.num}</span>
        <span class="q-text">${q.text}</span>
      </div>
      <div class="btn-row">
        <button class="btn-j" id="j-${idx}" onclick="answer(${idx}, true)">✓ Juist</button>
        <button class="btn-o" id="o-${idx}" onclick="answer(${idx}, false)">✗ Onjuist</button>
      </div>
      <div class="feedback" id="fb-${idx}"></div>
    `;
    container.appendChild(card);
  });
}

function answer(idx, userAnswer) {
  const q = questions[idx];
  const card = document.getElementById(`card-${idx}`);
  const fb = document.getElementById(`fb-${idx}`);
  const btnJ = document.getElementById(`j-${idx}`);
  const btnO = document.getElementById(`o-${idx}`);

  if (btnJ.disabled) return;

  btnJ.disabled = true;
  btnO.disabled = true;

  const isCorrect = (userAnswer === q.answer);
  answered++;

  if (isCorrect) {
    correct++;
    card.classList.add('correct');
    fb.className = 'feedback correct';
    fb.innerHTML = `✅ <strong>Goed!</strong> ${q.explanation}`;
    if (userAnswer === true) btnJ.classList.add('selected-correct');
    else btnO.classList.add('selected-correct');
  } else {
    wrong++;
    card.classList.add('wrong');
    fb.className = 'feedback wrong';
    const juistText = q.answer ? 'Juist' : 'Onjuist';
    fb.innerHTML = `❌ <strong>Fout — het goede antwoord is: ${juistText}.</strong> ${q.explanation}`;
    if (userAnswer === true) btnJ.classList.add('selected-wrong');
    else btnO.classList.add('selected-wrong');
  }

  updateScore();

  if (answered === 80) {
    document.getElementById('btn-results').style.display = 'inline-block';
  }
}

function updateScore() {
  document.getElementById('score-num').textContent = correct;
  document.getElementById('answered-num').textContent = answered;
  document.getElementById('correct-num').textContent = correct;
  document.getElementById('wrong-num').textContent = wrong;
  document.getElementById('progress-fill').style.width = (answered / 80 * 100) + '%';
}

function showResults() {
  const panel = document.getElementById('results-panel');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth' });

  const pct = Math.round(correct / 80 * 100);
  document.getElementById('res-score').textContent = `${correct}/80`;
  document.getElementById('res-score').style.color = correct >= 60 ? '#10b981' : '#ef4444';

  const verdict = document.getElementById('res-verdict');
  if (correct >= 60) {
    verdict.textContent = '🎉 Voldoende — geslaagd!';
    verdict.className = 'verdict pass';
    document.getElementById('res-msg').textContent = `Je hebt ${correct} van de 80 vragen goed (${pct}%). Voor de echte toets heb je minimaal 60 nodig. Goed gedaan!`;
  } else {
    verdict.textContent = `😓 Onvoldoende — nog ${60 - correct} extra nodig`;
    verdict.className = 'verdict fail';
    document.getElementById('res-msg').textContent = `Je hebt ${correct} van de 80 vragen goed (${pct}%). Je hebt nog ${60 - correct} vragen extra nodig om te slagen. Doe de toets nog een keer!`;
  }

  // Breakdown per section
  const sections = {};
  questions.forEach((q, idx) => {
    const s = q.section || currentSection;
    // track by question
  });

  // Simple breakdown
  document.getElementById('res-breakdown').innerHTML = `
    <div class="bitem"><strong>${correct}</strong><span>Goed</span></div>
    <div class="bitem"><strong>${wrong}</strong><span>Fout</span></div>
    <div class="bitem"><strong>${pct}%</strong><span>Score</span></div>
    <div class="bitem"><strong>${correct >= 60 ? '✓' : '✗'}</strong><span>Voldoende = 60+</span></div>
  `;
}

function resetAll() {
  answered = 0; correct = 0; wrong = 0;
  updateScore();
  document.getElementById('btn-results').style.display = 'none';
  document.getElementById('results-panel').style.display = 'none';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
