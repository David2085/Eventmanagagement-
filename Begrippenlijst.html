<!DOCTYPE html>

<head>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;padding-bottom:4rem}

    /* ── HEADER ── */
    .topbar{background:#1e293b;color:#fff;padding:1.2rem 1.5rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.3)}
    .topbar h1{font-size:1.1rem;white-space:nowrap}
    #searchbox{flex:1;min-width:180px;padding:.45rem .9rem;border-radius:8px;border:none;font-size:.95rem;outline:none}
    #counter{font-size:.8rem;color:#94a3b8;white-space:nowrap}

    /* ── CATEGORIEËN MENU ── */
    .catmenu{display:flex;gap:.5rem;flex-wrap:wrap;padding:1rem 1.5rem .25rem;max-width:1100px;margin:0 auto}
    .catbtn{padding:.35rem .85rem;border-radius:999px;border:2px solid transparent;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .15s;background:#fff;color:#475569}

    .catbtn.active{color:#fff;border-color:transparent}

    /* ── CONTAINER ── */
    .container{max-width:1100px;margin:0 auto;padding:1rem 1.5rem}

    /* ── SECTIE ── */
    .section{margin-bottom:2.5rem}

    /* ── GRID ── */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.75rem}

    /* ── KAART ── */
    .card{background:#fff;border-radius:12px;padding:1rem 1.2rem;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid #e2e8f0;transition:box-shadow .15s}

    .term{font-weight:700;font-size:.95rem;color:#1e293b;margin-bottom:.3rem}
    .def{font-size:.86rem;color:#475569;line-height:1.55}
    .formula{display:inline-block;background:#f1f5f9;border-radius:6px;padding:.2rem .5rem;font-family:monospace;font-size:.83rem;color:#1e293b;margin-top:.3rem}

    /* ── KLEUREN PER CATEGORIE ── */
    .cat-project .section-title{background:#dbeafe;color:#1d4ed8}
    .cat-project .card{border-left-color:#3b82f6}
    .cat-project .catbtn.active{background:#3b82f6}

    .cat-fasering .section-title{background:#dcfce7;color:#15803d}
    .cat-fasering .card{border-left-color:#22c55e}
    .cat-fasering .catbtn.active{background:#22c55e}

    .cat-planning .section-title{background:#fef9c3;color:#854d0e}
    .cat-planning .card{border-left-color:#eab308}
    .cat-planning .catbtn.active{background:#eab308}

    .cat-evm .section-title{background:#ede9fe;color:#5b21b6}
    .cat-evm .card{border-left-color:#8b5cf6}
    .cat-evm .catbtn.active{background:#8b5cf6}

    .cat-risico .section-title{background:#fee2e2;color:#b91c1c}
    .cat-risico .card{border-left-color:#ef4444}
    .cat-risico .catbtn.active{background:#ef4444}

    .cat-organisatie .section-title{background:#ffedd5;color:#9a3412}
    .cat-organisatie .card{border-left-color:#f97316}
    .cat-organisatie .catbtn.active{background:#f97316}

    .cat-belbin .section-title{background:#fce7f3;color:#9d174d}
    .cat-belbin .card{border-left-color:#ec4899}
    .cat-belbin .catbtn.active{background:#ec4899}

    .cat-scrum .section-title{background:#cffafe;color:#155e75}
    .cat-scrum .card{border-left-color:#06b6d4}
    .cat-scrum .catbtn.active{background:#06b6d4}

    .cat-kwaliteit .section-title{background:#f0fdf4;color:#166534}
    .cat-kwaliteit .card{border-left-color:#16a34a}
    .cat-kwaliteit .catbtn.active{background:#16a34a}

    .cat-overig .section-title{background:#f1f5f9;color:#334155}
    .cat-overig .card{border-left-color:#94a3b8}
    .cat-overig .catbtn.active{background:#64748b}

    /* ── NO RESULTS ── */
    #noResults{display:none;text-align:center;color:#94a3b8;padding:3rem;font-size:1rem}
  </style>
</head>
<body>

<div class="topbar">
  <h1>📖 Begrippenlijst Evenementenmanagement A</h1>
  <input type="text" id="searchbox" placeholder="Zoek een begrip..." oninput="filterAll()">
  <span id="counter"></span>
</div>

<div class="catmenu" id="catmenu"></div>

<div class="container" id="main"></div>
<div id="noResults">Geen begrippen gevonden voor "<span id="searchTerm"></span>"</div>

<script>
const data = [

  /* ══════════════════════════════════════
     1. PROJECTMANAGEMENT — BASISCONCEPTEN
     ══════════════════════════════════════ */
  {cat:"project", term:"Project",
   def:"Een tijdelijke, unieke samenwerking gericht op een vooraf bepaald resultaat, binnen afgesproken randvoorwaarden van tijd, geld en kwaliteit."},
  {cat:"project", term:"Projectkenmerken",
   def:"Tijdelijk, uniek, eenmalig, gericht op een concreet resultaat, met een projectteam, budget en deadline."},
  {cat:"project", term:"Lijnorganisatie",
   def:"De vaste, permanente organisatiestructuur van een bedrijf; tegenover projectorganisatie (tijdelijk)."},
  {cat:"project", term:"Opdrachtgever",
   def:"De persoon of organisatie die het project opdraagt, het budget verstrekt en het eindresultaat accepteert. Staat buiten het projectteam."},
  {cat:"project", term:"Projectleider",
   def:"Verantwoordelijk voor de dagelijkse uitvoering, planning en coördinatie van het project. Rapporteert aan de opdrachtgever."},
  {cat:"project", term:"Stuurgroep",
   def:"Strategisch beslisorgaan bestaande uit de opdrachtgever en andere beslissingsbevoegde stakeholders. Neemt go/no-go beslissingen bij faseovergangen."},
  {cat:"project", term:"Stakeholder",
   def:"Iedereen die belang heeft bij of invloed uitoefent op het project. Niet per se financieel — ook organisatorisch, maatschappelijk of persoonlijk."},
  {cat:"project", term:"Projectresultaat",
   def:"Het tastbare of ontastbare eindproduct van het project: kan een product, dienst, rapport, evenement of verandering zijn."},
  {cat:"project", term:"Kick-off meeting",
   def:"Officiële startbijeenkomst aan het begin van een project. Alle betrokkenen worden geïnformeerd over doel, aanpak en rolverdeling."},
  {cat:"project", term:"Go/no-go beslissing",
   def:"Formele beslissing aan het einde van een projectfase: gaan we door naar de volgende fase of stoppen we? Genomen door de stuurgroep."},
  {cat:"project", term:"Mijlpaal",
   def:"Meetbaar tussentijds resultaat of formeel beslismoment binnen een project. Geen doorlooptijd, wel een concreet resultaat."},
  {cat:"project", term:"Scope creep",
   def:"Ongecontroleerde, niet-geplande uitbreiding van de projectomvang zonder formele goedkeuring of aanpassing van budget en doorlooptijd."},
  {cat:"project", term:"Deliverable",
   def:"Een op te leveren resultaat (product, rapport, ontwerp). Niet hetzelfde als een activiteit — dat is de taak die nodig is om de deliverable te maken."},
  {cat:"project", term:"P6-methode",
   def:"Methode van Roel Grit voor het schrijven van een Plan van Aanpak: Probleemstelling, Producten, Planning, Personeel, Prijs, Plan van Aanpak."},
  {cat:"project", term:"Plan van Aanpak",
   def:"Het centrale projectdocument. Bevat: aanleiding, doelstelling, resultaat, aanpak, planning, begroting, risicoanalyse en organisatie."},
  {cat:"project", term:"SMART",
   def:"Methode om doelstellingen concreet te formuleren: Specifiek, Meetbaar, Acceptabel, Realistisch, Tijdgebonden. Garandeert niet dat een doel haalbaar is."},

  /* ══════════════════════════════════
     2. TRADITIONELE FASERING
     ══════════════════════════════════ */
  {cat:"fasering", term:"Traditionele fasering (volgorde)",
   def:"Definitie → Ontwerp → Voorbereiding → Realisatie → Nazorg. Let op: Ontwerp komt vóór Voorbereiding!"},
  {cat:"fasering", term:"Definitiefase",
   def:"Eerste fase: doel, haalbaarheid en opdracht worden bepaald. Levert het Plan van Aanpak op."},
  {cat:"fasering", term:"Ontwerpfase",
   def:"Tweede fase: uitwerken wat er gemaakt wordt. Levert een functioneel of technisch ontwerp (document), niet standaard een fysiek prototype."},
  {cat:"fasering", term:"Voorbereidingsfase",
   def:"Derde fase: inkoop, aanbesteding, detailplanning en organisatie klaarstomen voor uitvoering."},
  {cat:"fasering", term:"Realisatiefase",
   def:"Vierde fase: de daadwerkelijke uitvoering. Hier wordt het eindresultaat gebouwd of gerealiseerd."},
  {cat:"fasering", term:"Nazorgfase",
   def:"Vijfde fase: overdracht, evaluatie en afbouw van de projectorganisatie. Het resultaat wordt overgedragen aan de opdrachtgever of beheerorganisatie."},
  {cat:"fasering", term:"Watervalmodel",
   def:"Lineaire, sequentiële aanpak waarbij elke fase volledig wordt afgerond voor de volgende begint. Moeilijk om halverwege grote wijzigingen door te voeren."},
  {cat:"fasering", term:"Fase-gate",
   def:"Controlemoment aan het einde van elke fase. De stuurgroep beoordeelt of aan de criteria is voldaan en neemt een go/no-go beslissing."},

  /* ══════════════════════════════════
     3. PLANNING & BEHEERSASPECTEN
     ══════════════════════════════════ */
  {cat:"planning", term:"GOKIT",
   def:"Afkorting voor de vijf beheersaspecten: Geld, Organisatie, Kwaliteit, Informatie, Tijd. Zelfde als TGKIO en KOFTIG — andere volgorde."},
  {cat:"planning", term:"TGKIO",
   def:"Alternatieve volgorde van dezelfde vijf beheersaspecten: Tijd, Geld, Kwaliteit, Informatie, Organisatie."},
  {cat:"planning", term:"KOFTIG",
   def:"Nog een alternatieve volgorde van de vijf beheersaspecten. Alle drie (GOKIT, TGKIO, KOFTIG) verwijzen naar exact dezelfde vijf aspecten."},
  {cat:"planning", term:"Duivelsdriehoek (IJzeren driehoek)",
   def:"Model dat de drie basisbeperkingen van een project toont: Geld, Tijd en Kwaliteit/Scope. Als één kant verandert zonder aanpassing van de andere, daalt de kwaliteit."},
  {cat:"planning", term:"Gantt-chart",
   def:"Balkplanningsdiagram waarbij activiteiten als balken in de tijd worden weergegeven. Toont tijdsvolgorde, maar niet de inhoudelijke afhankelijkheid tussen activiteiten."},
  {cat:"planning", term:"WBS (Werkbreakdownstructuur)",
   def:"Hiërarchische opdeling van alle projectactiviteiten en -resultaten. Toont structuur, géén chronologische volgorde — dat doet een Gantt-chart."},
  {cat:"planning", term:"Kritiek pad (CPM)",
   def:"De langste reeks afhankelijke activiteiten zonder tijdsspeling (float). Vertraging op het kritieke pad leidt direct tot vertraging van het hele project."},
  {cat:"planning", term:"Float / tijdsspeling",
   def:"De hoeveelheid tijd die een activiteit mag uitlopen zonder het eindmoment van het project te beïnvloeden. Activiteiten op het kritieke pad hebben float = 0."},
  {cat:"planning", term:"Lead (voorsprong)",
   def:"In netwerkplanning: een opvolgende activiteit mag eerder starten dan normaal — er is overlap. Lead = versnelling/overlap."},
  {cat:"planning", term:"Lag (vertraging)",
   def:"In netwerkplanning: een wachttijd tussen twee activiteiten. De opvolgende activiteit moet wachten voordat zij kan beginnen. Lag = vertraging."},
  {cat:"planning", term:"PERT",
   def:"Planningstechniek die onzekerheid meeneemt via drie tijdschattingen per activiteit: optimistisch, meest waarschijnlijk en pessimistisch. Verschil met CPM: CPM gebruikt één schatting."},

  /* ══════════════════════════════════
     4. EARNED VALUE MANAGEMENT (EVM)
     ══════════════════════════════════ */
  {cat:"evm", term:"BAC (Budget at Completion)",
   def:"Het totale, goedgekeurde projectbudget. Uitgangspunt voor EVM-berekeningen.",
   formula:"BAC = totaalbudget"},
  {cat:"evm", term:"PV (Planned Value) = BCWS",
   def:"Het gebudgetteerde bedrag voor het werk dat op dit moment gepland stond te zijn afgerond.",
   formula:"PV = gepland werk × uurtarief"},
  {cat:"evm", term:"EV (Earned Value) = BCWP",
   def:"De budgetwaarde van het werk dat daadwerkelijk is uitgevoerd. Wat heeft het team 'verdiend' in termen van budget?",
   formula:"EV = % klaar × BAC"},
  {cat:"evm", term:"AC (Actual Cost) = ACWP",
   def:"De werkelijke kosten van het tot nu toe uitgevoerde werk.",
   formula:"AC = daadwerkelijk uitgegeven"},
  {cat:"evm", term:"CPI (Cost Performance Index)",
   def:"Meet kostenefficiëntie. CPI > 1 = onder budget. CPI < 1 = over budget.",
   formula:"CPI = EV ÷ AC"},
  {cat:"evm", term:"SPI (Schedule Performance Index)",
   def:"Meet planningsefficiëntie. SPI > 1 = voor op schema. SPI < 1 = achter op schema.",
   formula:"SPI = EV ÷ PV"},
  {cat:"evm", term:"CV (Cost Variance)",
   def:"Kostenverschil. Negatief = meer uitgegeven dan verdiend = over budget.",
   formula:"CV = EV − AC"},
  {cat:"evm", term:"SV (Schedule Variance)",
   def:"Planningsverschil. Negatief = minder gedaan dan gepland = achter op schema.",
   formula:"SV = EV − PV"},
  {cat:"evm", term:"EAC (Estimate at Completion)",
   def:"Verwachte totale projectkosten op basis van huidige CPI. Als CPI = 0,80 en BAC = €200k, dan EAC = €250k — meer dan gepland!",
   formula:"EAC = BAC ÷ CPI"},
  {cat:"evm", term:"ETC (Estimate to Complete)",
   def:"Verwachte resterende kosten om het project af te ronden.",
   formula:"ETC = EAC − AC"},

  /* ══════════════════════════════════
     5. RISICOBEHEERSING
     ══════════════════════════════════ */
  {cat:"risico", term:"Risico",
   def:"Een onzekere gebeurtenis die een positief (kans) of negatief (bedreiging) effect kan hebben op projectdoelen."},
  {cat:"risico", term:"Risicoscore",
   def:"Maatstaf voor de prioriteit van een risico. Hoger = urgenter.",
   formula:"Risicoscore = kans × impact"},
  {cat:"risico", term:"Risicomatrix",
   def:"Visueel hulpmiddel om risico's te prioriteren op basis van kans én impact. Hoge kans + hoge impact = hoge prioriteit."},
  {cat:"risico", term:"Risicorespons: Vermijden",
   def:"De projectactiviteit of -aanpak zo aanpassen dat het risico niet meer bestaat. Niet hetzelfde als een noodplan!"},
  {cat:"risico", term:"Risicorespons: Mitigeren",
   def:"De kans en/of impact van een risico verkleinen. Elimineert het risico niet volledig."},
  {cat:"risico", term:"Risicorespons: Overdragen (Transfer)",
   def:"Het risico neerleggen bij een andere partij, bijv. via verzekering of uitbesteding. Kost doorgaans extra geld (premie, contractkosten)."},
  {cat:"risico", term:"Risicorespons: Accepteren",
   def:"Het risico bewust accepteren, eventueel met een contingency plan (noodplan) als het toch optreedt."},
  {cat:"risico", term:"Contingency plan (noodplan)",
   def:"Vooraf opgesteld plan dat in werking treedt als een geaccepteerd risico zich daadwerkelijk voordoet."},
  {cat:"risico", term:"Oorzaak-gevolgdiagram (visgraatdiagram / Ishikawa)",
   def:"Hulpmiddel om oorzaken van een probleem systematisch in kaart te brengen. Categorieën: mens, machine, methode, materiaal, milieu, management."},

  /* ══════════════════════════════════
     6. PROJECTORGANISATIE
     ══════════════════════════════════ */
  {cat:"organisatie", term:"Matrixorganisatie",
   def:"Organisatievorm waarbij een medewerker rapporteert aan zowel de lijnmanager (functioneel) als de projectleider (projectmatig). Dubbele rapportagelijn."},
  {cat:"organisatie", term:"Zuivere projectorganisatie",
   def:"Medewerkers worden volledig losgemaakt van de lijnorganisatie voor de duur van het project. Projectleider heeft volledige zeggenschap."},
  {cat:"organisatie", term:"Stafprojectorganisatie",
   def:"Projectleider heeft een adviserende rol zonder directe bevoegdheid over de medewerkers; die blijven in de lijn."},
  {cat:"organisatie", term:"MVO (Maatschappelijk Verantwoord Ondernemen)",
   def:"Bedrijfsvoering waarbij rekening wordt gehouden met People (sociaal), Planet (milieu) en Profit (economisch). Standaardmodel heeft drie P's."},
  {cat:"organisatie", term:"People (MVO)",
   def:"De sociale dimensie van MVO: eerlijke arbeidsomstandigheden, mensenrechten, maatschappelijke bijdrage."},
  {cat:"organisatie", term:"Planet (MVO)",
   def:"De ecologische dimensie van MVO: milieubescherming, CO₂-reductie, duurzame grondstofgebruik."},
  {cat:"organisatie", term:"Profit (MVO)",
   def:"De economische dimensie van MVO: financieel gezonde bedrijfsvoering die waarde creëert voor alle stakeholders."},

  /* ══════════════════════════════════
     7. BELBIN TEAMROLLEN
     ══════════════════════════════════ */
  {cat:"belbin", term:"Belbin — overzicht",
   def:"Meredith Belbin onderscheidt 9 teamrollen verdeeld over 3 categorieën. Één persoon kan meerdere rollen vervullen."},
  {cat:"belbin", term:"Vormer (Shaper) — actiegericht",
   def:"Drijvende kracht, zet druk op resultaten, pakt obstakels aan. Zonder Vormer mist het team urgentie en richting."},
  {cat:"belbin", term:"Bedrijfsman / Zetter (Implementer) — actiegericht",
   def:"Vertaalt ideeën naar praktische actie, werkt gedisciplineerd en efficiënt."},
  {cat:"belbin", term:"Afmaker (Completer Finisher) — actiegericht",
   def:"Let op details, zorgt dat alles foutloos wordt opgeleverd, deadlinegericht."},
  {cat:"belbin", term:"Coördinator (Coordinator) — mensgeoriënteerd",
   def:"Leidt het team, delegeert goed, bewaakt de doelen. Vroeger ook 'Voorzitter' genaamd."},
  {cat:"belbin", term:"Groepswerker (Teamworker) — mensgeoriënteerd",
   def:"Houdt de teamsfeer goed, lost conflicten op, is diplomatiek en ondersteunend."},
  {cat:"belbin", term:"Brononderzoeker (Resource Investigator) — mensgeoriënteerd",
   def:"Enthousiast, netwerkt buiten het team, brengt kansen en ideeën van buiten naar binnen. Sociale/externe rol — geen taakgerichte rol!"},
  {cat:"belbin", term:"Plant / Bedenker (Plant) — cerebraal",
   def:"Creatief, origineel denker. Genereert vernieuwende ideeën maar communiceert slecht."},
  {cat:"belbin", term:"Monitor / Waarschuwer (Monitor Evaluator) — cerebraal",
   def:"Analytisch, objectief, beoordeelt opties kritisch. Heeft geen besluitvaardigheid maar wel goed oordeel."},
  {cat:"belbin", term:"Specialist (Specialist) — cerebraal",
   def:"Diepgaande vakkennis op een specifiek gebied. Scoort niet breed maar wel diep."},

  /* ══════════════════════════════════
     8. AGILE & SCRUM
     ══════════════════════════════════ */
  {cat:"scrum", term:"Agile",
   def:"Verzameling van waarden en principes voor flexibele softwareontwikkeling (Agile Manifesto 2001). Geschikt voor veranderende of onduidelijke eisen."},
  {cat:"scrum", term:"Agile Manifesto — 4 kernwaarden",
   def:"1) Mensen & interactie > processen & tools. 2) Werkende software > uitgebreide documentatie. 3) Klantcollaboratie > contractonderhandeling. 4) Inspelen op verandering > plan volgen."},
  {cat:"scrum", term:"Scrum",
   def:"Agile framework met vaste rollen, ceremonies en artefacten. Werk in sprints van 1–4 weken."},
  {cat:"scrum", term:"Sprint",
   def:"Timeboxed iteratie van 1–4 weken. Het team levert aan het einde een werkend increment op. De duur is vast gedurende het project."},
  {cat:"scrum", term:"Product Owner",
   def:"Verantwoordelijk voor de product backlog: prioriteert, beheert en communiceert wat er gebouwd moet worden. Vertegenwoordigt de klant/business."},
  {cat:"scrum", term:"Scrum Master",
   def:"Dienende leider die het Scrum-proces begeleidt en obstakels wegneemt. Heeft geen inhoudelijke bevoegdheid en is niet verantwoordelijk voor de backlog."},
  {cat:"scrum", term:"Development Team",
   def:"Zelforganiserend, cross-functioneel team dat het werk uitvoert. Bepaalt zelf hoeveel werk het in een sprint kan verwerken (velocity)."},
  {cat:"scrum", term:"Product Backlog",
   def:"Geprioriteerde lijst van alle gewenste functionaliteiten, bugs en verbeteringen. Bevat zowel voltooide als nog te doen items. Eigendom van de Product Owner."},
  {cat:"scrum", term:"Sprint Backlog",
   def:"De subset van de product backlog die het team in de huidige sprint gaat realiseren."},
  {cat:"scrum", term:"Increment",
   def:"Het opgeleverde, werkende product aan het einde van een sprint. Moet voldoen aan de Definition of Done."},
  {cat:"scrum", term:"Sprint Planning",
   def:"Ceremonie aan het begin van een sprint: team kiest werk uit de backlog en maakt een plan voor de sprint."},
  {cat:"scrum", term:"Daily Scrum (standup)",
   def:"Dagelijkse afstemming van maximaal 15 minuten: wat heb ik gisteren gedaan, wat doe ik vandaag, welke obstakels heb ik?"},
  {cat:"scrum", term:"Sprint Review",
   def:"Ceremonie aan het einde van de sprint: het team demonstreert het opgeleverde increment aan de Product Owner en stakeholders. Over het PRODUCT."},
  {cat:"scrum", term:"Sprint Retrospective",

  {cat:"scrum", term:"Definition of Done (DoD)",

  {cat:"scrum", term:"Velocity",
   def:"De gemiddelde hoeveelheid werk (in story points) die een team per sprint verwerkt. Basis voor capaciteitsplanning."},

  /* ══════════════════════════════════
     9. KWALITEITSMANAGEMENT
     ══════════════════════════════════ */
  {cat:"kwaliteit", term:"Kwaliteitsmanagement",
   def:"Omvat drie onderdelen: kwaliteitsplanning (wat zijn de eisen?), kwaliteitsborging (procedures) en kwaliteitscontrole (meten of er aan is voldaan)."},
  {cat:"kwaliteit", term:"FAT (Factory Acceptance Test)",
   def:"Acceptatietest die plaatsvindt bij de LEVERANCIER/fabrikant. De klant controleert of het product aan de eisen voldoet voordat het verzonden wordt."},
  {cat:"kwaliteit", term:"SAT (Site Acceptance Test)",
   def:"Acceptatietest die plaatsvindt bij de KLANT/locatie. Controle of het geïnstalleerde systeem correct werkt in de echte omgeving."},

  /* ══════════════════════════════════
     10. OVERIGE BEGRIPPEN

const cats = [
  {key:"project",      label:"📋 Basis projectmanagement", cls:"cat-project"},
  {key:"fasering",     label:"📅 Traditionele fasering",    cls:"cat-fasering"},
  {key:"planning",     label:"📊 Planning & beheersaspecten", cls:"cat-planning"},
  {key:"evm",          label:"💹 EVM-berekeningen",         cls:"cat-evm"},
  {key:"risico",       label:"⚠️ Risicobeheersing",         cls:"cat-risico"},
  {key:"organisatie",  label:"🏢 Organisatie & MVO",        cls:"cat-organisatie"},
  {key:"belbin",       label:"👥 Belbin-rollen",            cls:"cat-belbin"},
  {key:"scrum",        label:"🔄 Agile & Scrum",            cls:"cat-scrum"},
  {key:"kwaliteit",    label:"✅ Kwaliteit & FAT/SAT",      cls:"cat-kwaliteit"},
  {key:"overig",       label:"💡 Overige begrippen",        cls:"cat-overig"},
];

/* ════════ RENDER ════════ */
function render(filterCat, searchText){
  const main = document.getElementById('main');
  main.innerHTML = '';
  let totalShown = 0;

  cats.forEach(c => {
    if(filterCat && filterCat !== c.key) return;
    const items = data.filter(d => d.cat === c.key && matchSearch(d, searchText));
    if(!items.length) return;
    totalShown += items.length;

    const sec = document.createElement('div');
    sec.className = `section ${c.cls}`;
    sec.innerHTML = `<div class="section-title">${c.label}</div>`;
    const grid = document.createElement('div');
    grid.className = 'grid';
    items.forEach(d => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="term">${highlight(d.term, searchText)}</div>
        <div class="def">${highlight(d.def, searchText)}</div>
        ${d.formula ? `<div class="formula">${d.formula}</div>` : ''}`;
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    main.appendChild(sec);
  });

  document.getElementById('counter').textContent = totalShown + ' begrippen';
  document.getElementById('noResults').style.display = totalShown ? 'none' : 'block';
  document.getElementById('searchTerm').textContent = searchText;
}

function matchSearch(d, txt){
  if(!txt) return true;
  const t = txt.toLowerCase();
  return d.term.toLowerCase().includes(t) || d.def.toLowerCase().includes(t);
}

function highlight(text, query){
  if(!query) return text;
  const regex = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(regex, '<mark style="background:#fef08a;border-radius:3px;padding:0 2px">$1</mark>');
}

/* ════════ CATEGORIEKNOPJES ════════ */
let activeCat = null;
function buildCatMenu(){
  const menu = document.getElementById('catmenu');
  const allBtn = document.createElement('button');
  allBtn.className = 'catbtn active';
  allBtn.textContent = '🔍 Alles';
  allBtn.style.background = '#1e293b';
  allBtn.style.color = '#fff';
  allBtn.onclick = () => { activeCat = null; document.querySelectorAll('.catbtn').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color=''}); allBtn.classList.add('active'); allBtn.style.background='#1e293b'; allBtn.style.color='#fff'; filterAll(); };
  menu.appendChild(allBtn);

  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = `catbtn ${c.cls}`;
    btn.textContent = c.label;
    btn.onclick = () => {
      activeCat = c.key;
      document.querySelectorAll('.catbtn').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color=''});
      allBtn.style.background=''; allBtn.style.color='';
      btn.classList.add('active');
      filterAll();
    };
    menu.appendChild(btn);
  });
}

function filterAll(){
  const q = document.getElementById('searchbox').value.trim();
  render(activeCat, q);
}

buildCatMenu();
render(null, '');
</script>
